<head>

    <style>
        /* 全局样式重置：清除默认边距，统一盒模型，设置全局字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        /* 顶部导航栏：弹性布局，垂直居中，渐变背景，内边距 */
        .header {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #b0f3d0, #a0d8ff);
            padding: 15px 30px;
        }

        /* 左上角Logo区域：弹性布局，垂直居中，右侧间距 */
        .header-logo {
            display: flex;
            align-items: center;
            margin-right: 50px;
        }
        /* Logo图片：圆形，固定尺寸，右侧间距 */
        .header-logo img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 10px;
        }
        /* Logo文字标题字号 */
        .header-logo-text h1 {
            font-size: 24px;
            font-weight: 500;
        }
        /* Logo文字副标题字号 */
        .header-logo-text p {
            font-size: 18px;
            font-weight: 500;
        }

        /* 导航标签栏：弹性布局，标签之间间距，自动占满剩余空间 */
        .nav-tabs {
            display: flex;
            gap: 40px;
            margin-right: auto;
        }
        /* 单个导航标签：字号，颜色，鼠标手势，内边距，过渡动画 */
        .nav-tab {
            font-size: 18px;
            color: #333;
            cursor: pointer;
            padding: 5px 0;
            transition: all 0.3s;
        }
        /* 激活状态标签：加粗，底部边框 */
        .nav-tab.active {
            font-weight: bold;
            border-bottom: 2px solid #333;
        }

        /* 搜索框：弹性布局，垂直居中，红色背景，圆角，内边距 */
        .search-box {
            display: flex;
            align-items: center;
            background: #ff4444;
            border-radius: 20px;
            padding: 5px 15px;
        }
        /* 搜索输入框：无边框，透明背景，白色文字，无轮廓，固定宽度 */
        .search-box input {
            border: none;
            background: transparent;
            color: white;
            outline: none;
            padding: 5px;
            width: 150px;
        }
        /* 搜索框占位符文字颜色（半透明白色） */
        .search-box input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        /* 搜索按钮：无边框，透明背景，白色文字，鼠标手势 */
        .search-box button {
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        /* 主体容器：弹性布局，内边距，子元素间距 */
        .main-container {
            display: flex;
            padding: 30px;
            gap: 30px;
        }

        /* 左侧侧边栏：固定宽度，居中对齐 */
        .sidebar {
            width: 280px;
            text-align: center;
        }
        /* 侧边栏头像：大圆形，图片自适应，底部间距 */
        .sidebar .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        /* 侧边栏姓名字号，底部间距 */
        .sidebar h2 {
            font-size: 28px;
            margin-bottom: 20px;

        /* 联系信息：左对齐，上下边距，字号，行高 */

            margin: 20px 0;
            font-size: 16px;
            line-height: 2;

            margin-top: 30px;

            font-size: 22px;
            margin-bottom: 10px;
        }
        /* 自我评价列表：清除默认样式，字号，行高 */
        .sidebar .self-evaluation ul {
            list-style: none;
            font-size: 14px;
            line-height: 1.8;
        }

        /* 右侧内容区：自动占满剩余宽度 */
        .content-area {
            flex: 1;
        }
        /* 记事本容器：边框，圆角，内边距，相对定位（用于装饰） */
        .notebook {
            border: 3px solid #333;
            border-radius: 15px;
            padding: 30px;
            position: relative;
            background: white;
        }
        /* 记事本顶部线圈装饰：绝对定位，重复线性渐变 */
        .notebook::before {
            content: "";
            position: absolute;
            top: -12px;
            left: 0;
            right: 0;
            height: 24px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                #333 20px,
                #333 30px
            );
            border-radius: 10px 10px 0 0;
        }
        /* 记事本标题：字号，居中，底部间距，加粗 */
        .notebook h2 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }
        /* 记事本内容：字号，行高 */
        .notebook .content {
            font-size: 18px;
            line-height: 2;
        }
        /* 搜索高亮样式：灰色背景，深灰色文字 */
        .highlight {
            background-color: #cccccc;
            color: #666666;
        }

        /* 页脚：居中对齐，内边距，字号，文字颜色 */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

            },
            internship: {
                title: '实习经历',
                content: '<strong>2025.01-2025.05：宁德时代新能源科技股份有限公司（时代润智）——IT部门实习生</strong><br>➢ 负责IT运维工单数据采集，运用BI工具完成数据清洗与分析，搭建可视化面板<br>➢ 参与ITSM工单运维系统的功能测试，撰写测试报告，保障系统稳定上线<br>➢ 梳理ITSM、变更管理等核心运维系统全流程逻辑，完善标准化SOP操作文档，规范团队运维流程<br>➢ 协助ITSM工单系统日常运维，排查流程卡点，保障工单高效顺畅流转<br>➢ 运维IT机器人的数据库，持续完善AI知识库并推动迭代优化'
            },
            honor: {
                title: '个人荣誉',
                content: '➢ 2023-2024学年：荣获国家奖学金<br>➢ 2023-2024学年：荣获国家级2024年（第17届）中国大学生计算机设计大赛二等奖<br>➢ 2022-2023学年：荣获省级中国书画家联谊会第三届青少年书画大展美术作品二等奖（入选）<br>➢ 2021-2024学年：荣获校级优秀学生一等奖学金和优秀学生综合二等奖学金<br>➢ 2021-2024学年：荣获校级“三好学生”称号和“优秀学生干部”称号<br>➢ 2022-2023学年：荣获校级2023年CMAU全国大学生市场研究与商业策划大赛二等奖<br>➢ 2023.05：普通话水平等级证书——二级乙等<br>➢ 2024.04：“缘起 | 看见”益童前行关爱留守儿童支教计划“优秀志愿者”称号<br>➢ 2024.07：计算机软件著作权——绿意智控生活盆栽系统'

                        ➢ 系统软硬件协同开发，硬件端完成传感器、执行器等模块选型与电路设计，软件端编写嵌入式程序，运用中值滤波算法优化数据精度，开发移动端APP实现数据可视化、远程控制功能，接入AI大模型提供个性化养护建议<br>\

        // ==================== 3. 页面初始化：自动加载教育背景 ====================
        function initPage() {
            // 默认显示第一个tab（教育背景）
            const defaultTab = document.querySelector('.nav-tab[data-tab="education"]');
            defaultTab.classList.add('active');
            notebookTitle.textContent = tabContents.education.title;
            notebookContent.innerHTML = tabContents.education.content;
        }

        // ==================== 4. 导航标签切换功能 ====================
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabKey = tab.dataset.tab;
                notebookTitle.textContent = tabContents[tabKey].title;
                notebookContent.innerHTML = tabContents[tabKey].content;
                searchInput.value = '';
            });
        });

        // ==================== 5. 搜索高亮功能 ====================
        function highlightText(html, keyword) {
            if (!keyword) return html;
            const escapedKey = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const reg = new RegExp(`(${escapedKey})`, 'gi');
            return html.replace(reg, '<span class="highlight">$1</span>');
        }

        function searchAndHighlight() {
            const keyword = searchInput.value.trim();
            const activeKey = document.querySelector('.nav-tab.active').dataset.tab;
            const originalHtml = tabContents[activeKey].content;

            if (!keyword) {
                notebookContent.innerHTML = originalHtml;
                return;
            }

            notebookContent.innerHTML = highlightText(originalHtml, keyword);
        }

        searchBtn.addEventListener('click', searchAndHighlight);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchAndHighlight();
        });

        // ==================== 6. 执行初始化 ====================
        window.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
